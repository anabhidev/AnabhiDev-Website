<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Not Found — Anabhi Dev</title>
<meta name="robots" content="noindex, follow">
<link rel="icon" href="/favicon.ico" sizes="any">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0B1829;
    --blue: #3B9EE8;
    --blue-lt: #6AB8F0;
    --w60: rgba(255,255,255,0.60);
    --w07: rgba(255,255,255,0.07);
    --w12: rgba(255,255,255,0.12);
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body {
    font-family:'DM Sans',sans-serif;
    background:var(--navy); color:#fff;
    min-height:100vh; display:flex; flex-direction:column;
    align-items:center; justify-content:center; text-align:center;
    padding:24px;
  }
  .logo-404 { height:110px; margin-bottom:36px; }
  .code {
    font-family:'Sora',sans-serif; font-size:clamp(64px,12vw,140px);
    font-weight:800; color:var(--blue); line-height:1; letter-spacing:-.03em;
    margin-bottom:8px;
  }
  h1 {
    font-family:'Sora',sans-serif; font-size:clamp(20px,3vw,28px);
    font-weight:700; margin-bottom:14px;
  }
  p {
    font-size:15px; line-height:1.7; color:var(--w60);
    max-width:420px; margin-bottom:32px;
  }
  .btns { display:flex; gap:14px; flex-wrap:wrap; justify-content:center; }
  .btn-p {
    font-family:'Sora',sans-serif; font-size:14px; font-weight:600;
    color:var(--navy); background:var(--blue);
    padding:14px 30px; border-radius:50px; text-decoration:none;
    transition:all .25s;
  }
  .btn-p:hover { background:var(--blue-lt); transform:translateY(-2px); }
  .btn-g {
    font-family:'Sora',sans-serif; font-size:14px; font-weight:500;
    color:rgba(255,255,255,.9); background:var(--w07); border:1px solid var(--w12);
    padding:14px 30px; border-radius:50px; text-decoration:none;
    transition:all .25s;
  }
  .btn-g:hover { background:var(--w12); transform:translateY(-2px); }
  .tag { margin-top:48px; font-family:'Sora',sans-serif; font-size:11px; font-weight:600; letter-spacing:.1em; text-transform:uppercase; color:rgba(255,255,255,.3); }
</style>
</head>
<body>
  <img src="https://anabhidev.netlify.app/logo.png" alt="Anabhi Dev" class="logo-404">

  <div class="btns">
    <a href="/" class="btn-p">← Back to Home</a>
    <a href="/#cta" class="btn-g">Contact Me</a>
  </div>
  <div class="tag">Anabhi Dev — Less Doing. More Living.</div>

</html>
