<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>I Gede Agus Wibawa | Jagadita Consulting</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #00677f;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      font-family: "DM Sans", sans-serif;
      padding: 24px 16px;
    }

    .card {
      width: 100%;
      max-width: 400px;
      background: #0097B2;
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 24px 64px rgba(0,0,0,0.35);
    }

    /* LOGO SECTION - 3px atas, 1px bawah */
    .logo-section {
      background: #ffffff;
      padding: 3px 28px 1px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .logo-img {
      width: 150px;
      height: 110px;
      object-fit: cover;
      object-position: center 35%;
    }

    /* NAMA SECTION */
    .name-section {
      background: #0097B2;
      padding: 18px 28px 8px;
      text-align: center;
    }

    .name {
      font-size: 28px;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: -0.3px;
      margin-bottom: 4px;
    }

    .title {
      font-size: 14px;
      font-weight: 500;
      color: rgba(255,255,255,0.7);
      letter-spacing: 2.5px;
      text-transform: uppercase;
    }

    /* FOTO SECTION - relative untuk posisi garis divider */
    .photo-section {
      background: #0097B2;
      display: flex;
      justify-content: center;
      padding: 8px 28px 8px;
      position: relative;
    }

    /* GARIS - absolute di tengah lingkaran foto */
    .photo-divider {
      position: absolute;
      left: 28px;
      right: 28px;
      top: 50%;
      height: 1px;
      background: rgba(255,255,255,0.15);
      transform: translateY(-50%);
    }

    .avatar {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      border: 3px solid rgba(255,255,255,0.55);
      overflow: hidden;
      box-shadow: 0 6px 24px rgba(0,0,0,0.25);
      position: relative;
      z-index: 1;
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      display: block;
    }

    /* CONTACT LIST */
    .contact-list {
      display: flex;
      flex-direction: column;
      padding: 8px 20px 20px;
    }

    .contact-item {
      display: flex;
      align-items: center;
      gap: 14px;
      text-decoration: none;
      padding: 11px 12px;
      border-radius: 10px;
      background: transparent;
      border-left: 3px solid transparent;
      transition: background 0.18s ease, border-color 0.18s ease, padding-left 0.18s ease;
    }

    .contact-item:hover, .contact-item:active {
      background: rgba(255,255,255,0.12);
      border-left-color: rgba(255,255,255,0.55);
      padding-left: 9px;
    }

    .contact-icon {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(255,255,255,0.18);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .contact-icon svg {
      width: 16px;
      height: 16px;
      fill: #ffffff;
    }

    .contact-text {
      display: flex;
      flex-direction: column;
    }

    .contact-label {
      font-size: 12px;
      color: rgba(255,255,255,0.76);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 1px;
    }

    .contact-value {
      font-size: 15px;
      font-weight: 500;
      color: #ffffff;
    }

    /* BUTTON */
    .btn-save {
      display: block;
      margin: 4px 20px 24px;
      padding: 14px;
      background: transparent;
      border: 1.5px solid rgba(255,255,255,0.45);
      border-radius: 14px;
      color: #ffffff;
      font-family: "DM Sans", sans-serif;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      text-align: center;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s ease, border-color 0.2s ease;
    }

    .btn-save:hover, .btn-save:active {
      background: rgba(255,255,255,0.15);
      border-color: rgba(255,255,255,0.8);
    }

    /* FOOTER */
    .card-footer {
      padding: 10px 28px 18px;
      text-align: center;
      border-top: 1px solid rgba(255,255,255,0.1);
    }

    .footer-text {
      font-size: 9px;
      color: rgba(255,255,255,0.35);
      letter-spacing: 2px;
      text-transform: uppercase;
    }
  </style>
