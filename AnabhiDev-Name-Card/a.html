<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>I Gede Agus Wibawa | Anabhi Dev</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Sora:wght@400;600;700&display=swap");
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: #060e1a;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      font-family: "Inter", sans-serif;
      padding: 24px 16px;
    }
    .card {
      width: 100%;
      max-width: 420px;
      background: #0d1b2a;
      border-radius: 28px;
      overflow: visible;
      box-shadow: 0 24px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(180,200,255,0.08);
    }

    /* Header: fixed height, logo center, garis di bottom, overflow visible untuk avatar */
    .card-header {
      position: relative;
      height: 160px;
      background: #0a1520;
      border-radius: 28px 28px 0 0;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: visible;
    }

    /* Garis silver di bottom header */
    .card-header::after {
      content: "";
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, #a0b4cc, #d0dce8, #a0b4cc, transparent);
    }

    .logo-img {
      width: 155px;
      object-fit: contain;
    }

    /* Avatar: absolute, bottom overlap garis, center horizontal */
    .avatar-wrap {
      position: absolute;
      bottom: -58px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
    }

    .avatar-ring {
      width: 84px;
      height: 84px;
      border-radius: 50%;
      padding: 3px;
      background: linear-gradient(135deg, #8aafc8, #d0dce8, #8aafc8);
      box-shadow: 0 4px 24px rgba(0,0,0,0.5), 0 0 20px rgba(140,180,220,0.2);
    }

    .avatar {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      overflow: hidden;
      background: #1a2a3a;
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 10%;
      display: block;
    }

    /* Body: padding-top besar untuk beri ruang avatar yang melayang */
    .card-body {
      padding: 69px 28px 24px;
      background: #0d1b2a;
      border-radius: 0 0 28px 28px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .name {
      font-family: "Sora", sans-serif;
      font-size: 22px;
      font-weight: 700;
      color: #e8f0f8;
      margin-bottom: 4px;
      letter-spacing: -0.3px;
    }
    .title {
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #5b9bd5;
      margin-bottom: 2px;
    }
    .company {
      font-size: 12px;
      color: #7a8fa0;
      margin-bottom: 20px;
    }
    .body-divider {
      width: 60px;
      height: 2px;
      background: linear-gradient(90deg, transparent, #5b9bd5, transparent);
      margin-bottom: 20px;
    }
    .contact-list {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 24px;
    }
    .contact-item {
      display: flex;
      align-items: center;
      gap: 14px;
      background: #0f2035;
      border: 1px solid rgba(91,155,213,0.12);
      border-radius: 14px;
      padding: 13px 16px;
      text-decoration: none;
      transition: background 0.2s, border-color 0.2s;
    }
    .contact-item:hover {
      background: #162840;
      border-color: rgba(91,155,213,0.3);
    }
    .contact-icon {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      background: linear-gradient(135deg, #1a3a5c, #0f2035);
      border: 1px solid rgba(91,155,213,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .contact-icon svg {
      width: 18px;
      height: 18px;
      fill: #5b9bd5;
    }
    .contact-text {
      display: flex;
      flex-direction: column;
      text-align: left;
    }
    .contact-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #4a6a85;
      margin-bottom: 2px;
    }
    .contact-value {
      font-size: 14px;
      color: #c8d8e8;
    }
    .btn-save {
      display: block;
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #8aafc8, #c8dae8, #8aafc8);
      color: #0a1520;
      text-align: center;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      text-decoration: none;
      border-radius: 14px;
      cursor: pointer;
      border: none;
      transition: opacity 0.2s, transform 0.1s;
    }
    .btn-save:hover { opacity: 0.9; transform: translateY(-1px); }
    .card-footer {
      padding: 14px 28px 20px;
      background: #0a1520;
      border-top: 1px solid rgba(255,255,255,0.05);
      border-radius: 0 0 28px 28px;
      text-align: center;
    }
    .footer-text {
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #3a5268;
    }
  </style>
</head>
