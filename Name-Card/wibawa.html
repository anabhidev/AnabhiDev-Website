<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>I Gede Agus Wibawa | Miss Fish Bali</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Montserrat:wght@300;400;500;600&display=swap");
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: #e0e0e0;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      font-family: "Montserrat", sans-serif;
      padding: 20px;
    }
    .card {
      width: 100%;
      max-width: 420px;
      background: #fff;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }
    .card-header {
      position: relative;
      height: 165px;
      background: #0a0a0a;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: visible;
    }
    .card-header::after {
      content: "";
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, #c9a84c, #f0d080, #c9a84c, transparent);
    }
    .logo-img {
      width: 230px;
      object-fit: contain;
    }
    .avatar-wrap {
      position: absolute;
      bottom: -38px;
      left: 28px;
      z-index: 10;
    }
    .avatar {
      width: 76px;
      height: 76px;
      border-radius: 50%;
      border: 3px solid #c9a84c;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      background: #333;
    }
    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      display: block;
    }
    .card-body {
      padding: 50px 28px 20px;
      background: #fff;
    }
    .name {
      font-family: "Playfair Display", serif;
      font-size: 26px;
      font-weight: 700;
      color: #111;
      margin-bottom: 4px;
      line-height: 1.2;
    }
    .title {
      font-family: "Playfair Display", serif;
      font-size: 12px;
      font-weight: 700;
      color: #c9a84c;
      margin-bottom: 2px;
    }
    .company {
      font-family: "Playfair Display", serif;
      font-size: 12px;
      font-weight: 400;
      color: #333;
      margin-bottom: 12px;
    }
    .divider {
      height: 1px;
      background: linear-gradient(90deg, #c9a84c66, transparent);
      margin-bottom: 12px;
    }
    .contact-list {
      display: flex;
      flex-direction: column;
      gap: 7px;
      margin-bottom: 16px;
    }
    .contact-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      text-decoration: none;
      padding: 9px 12px;
      border-radius: 10px;
      background: #fafafa;
      border: 1px solid #eee;
      transition: all 0.2s ease;
    }
    .contact-item:hover, .contact-item:active {
      background: #fff8ee;
      border-color: #c9a84c55;
      transform: translateX(3px);
    }
    .contact-icon {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      background: #111;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      flex-shrink: 0;
    }
    .contact-icon svg { width:15px; height:15px; fill:#c9a84c; }
    .contact-text { display:flex; flex-direction:column; }
    .contact-label {
      font-size: 8px;
      color: #aaa;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 2px;
      font-family: "Montserrat", sans-serif;
    }
    .contact-value {
      font-family: "Playfair Display", serif;
      font-size: 13px;
      color: #222;
    }
    .btn-save {
      display: block;
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #b8943e, #f0d080, #b8943e);
      border: none;
      border-radius: 12px;
      color: #0a0a0a;
      font-family: "Montserrat", sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      text-align: center;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(201,168,76,0.35);
      text-decoration: none;
    }
    .card-footer {
      padding: 12px 28px 16px;
      background: #fff;
      text-align: center;
      border-top: 1px solid #f0f0f0;
    }
    .footer-text {
      font-size: 8px;
      color: #bbb;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
  </style>
</head>
