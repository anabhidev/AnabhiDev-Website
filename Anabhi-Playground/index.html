<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Playground Anabhi</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    overflow: hidden;
  }

  body {
    font-family: 'Baloo 2', 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #FFF4D6 0%, #FFE8F0 50%, #E8E4FF 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    width: 100vw;
    padding: 16px;
  }

  @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&display=swap');

  .banner {
    max-width: 320px;
    width: 100%;
    height: auto;
    margin-bottom: 4px;
  }

  h1 {
    font-size: clamp(1.8rem, 5vw, 2.8rem);
    font-weight: 800;
    background: linear-gradient(90deg, #FF6B9D, #FFA94D, #6BCB77, #4D96FF);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    text-align: center;
    margin-bottom: 24px;
  }

  .cards {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    justify-content: center;
    max-width: 900px;
  }

  .card {
    text-decoration: none;
    background: #FFFFFF;
    border-radius: 24px;
    padding: 24px 20px;
    width: 220px;
    display: flex;
    flex-direction: column;
    align-items: center;
    box-shadow: 0 8px 20px rgba(0,0,0,0.08);
    border: 3px solid transparent;
    transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
  }

  .card:hover, .card:focus-visible {
    transform: translateY(-6px) scale(1.03);
    box-shadow: 0 14px 28px rgba(0,0,0,0.14);
  }

  .card:nth-child(1):hover { border-color: #FF6B9D; }
  .card:nth-child(2):hover { border-color: #9B6BFF; }
  .card:nth-child(3):hover { border-color: #4D96FF; }

  .card-emoji {
    font-size: 3rem;
    margin-bottom: 12px;
  }

  .card-title {
    font-size: 1.15rem;
    font-weight: 700;
    color: #3A3A55;
    text-align: center;
  }
